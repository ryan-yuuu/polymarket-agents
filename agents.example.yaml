broker_url: "localhost:9092"

execution:
  mode: paper

market_data:
  gamma_api_url: "https://gamma-api.polymarket.com"
  clob_api_url: "https://clob.polymarket.com"
  ws_url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"

agents:
  - name: "btc-trader-15m"
    model:
      provider: openai
      model_name: "gpt-5-mini"
    timeframe: "15m"
    poll_interval_seconds: 60
    initial_balance: 10000.0
    cycle_timeout_seconds: 300  # max seconds to wait for agent response per cycle
    # resume: false  # default — starts a fresh session each time

  # To resume a previous session (picks up latest CSV, ignores initial_balance):
  # - name: "btc-trader-15m"
  #   model:
  #     provider: openai
  #     model_name: "gpt-5-mini"
  #   timeframe: "15m"
  #   poll_interval_seconds: 60
  #   resume: true

  # - name: "btc-trader-claude"
  #   model:
  #     provider: anthropic
  #     model_name: "claude-sonnet-4-6"
  #   timeframe: "15m"
  #   poll_interval_seconds: 60
  #   initial_balance: 10000.0

  # Contrarian agent (silently flips trade direction):
  # - name: "contrarian-btc-5m"
  #   model:
  #     provider: openai
  #     model_name: "gpt-5-mini"
  #   timeframe: "5m"
